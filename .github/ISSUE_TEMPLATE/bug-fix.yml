name: PersonaX Bug Fix
description: 버그 수정 작업
title: "[Bug] "
labels:
  - bug

body:
  - type: dropdown
    id: phase
    attributes:
      label: 작업 단계
      options:
        - Analysis Only
        - Fix Approved
        - Commit Approved
    validations:
      required: true

  - type: textarea
    id: symptom
    attributes:
      label: 버그 현상
      description: 실제 발생한 현상을 작성하세요.
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: 예상 원인
      description: 추정 원인을 작성하세요.
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: 수정 후보 파일
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: 제약 조건
      value: |
        API 호출 금지
        promptfoo 실행 금지
        실제 LLM 테스트 금지
        지정 파일 외 수정 금지
        commit/push 금지 (별도 승인 전까지)
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 검증 방법
      value: |
        npx tsc --noEmit
        git diff
        정적 확인
    validations:
      required: true

  - type: textarea
    id: report
    attributes:
      label: 보고 형식
      value: |
        1. 원인 1~3순위
        2. 수정 위치
        3. 변경 전 문제
        4. 변경 후 내용
        5. tsc 결과
        6. git diff 요약
    validations:
      required: true