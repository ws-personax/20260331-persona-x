name: PersonaX Refactor
description: 구조 개선 및 파일 분리
title: "[Refactor] "
labels:

* refactor

body:

* type: dropdown
  id: phase
  attributes:
  label: 작업 단계
  options:
  - Analysis Only
  - Refactor Approved
  - Commit Approved
  validations:
  required: true

* type: textarea
  id: goal
  attributes:
  label: 목표
  validations:
  required: true

* type: textarea
  id: scope
  attributes:
  label: 수정 범위
  validations:
  required: true

* type: textarea
  id: forbidden
  attributes:
  label: 수정 금지
  value: |
  route.ts 전체 수정 금지
  ChatWindow 전체 수정 금지
  DB 스키마 변경 금지
  API 호출 금지
  promptfoo 금지
  실제 LLM 테스트 금지
  commit/push 금지, 별도 승인 전까지
  validations:
  required: true

* type: textarea
  id: verification
  attributes:
  label: 검증
  value: |
  npx tsc --noEmit
  git diff
  validations:
  required: true

* type: textarea
  id: done
  attributes:
  label: 완료 조건
  validations:
  required: true
