name: PersonaX Output Quality
description: 답변 품질, 프롬프트, 페르소나 톤 수정
title: "[Output] "
labels:
  - output-quality

body:
  - type: dropdown
    id: phase
    attributes:
      label: 작업 단계
      options:
        - Analysis Only
        - Modification Approved
        - Commit Approved
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 문제 현상
      description: 현재 발생하는 문제를 입력하세요.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 수정 후 기대하는 동작을 입력하세요.
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: 수정 후보 파일
      description: 수정 가능 파일 목록
    validations:
      required: true

  - type: textarea
    id: forbidden
    attributes:
      label: 금지 사항
      value: |
        API 호출 금지
        promptfoo 실행 금지
        실제 LLM 테스트 금지
        지정 파일 외 수정 금지
        commit/push 금지 (별도 승인 전까지)
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 검증 방법
      value: |
        npx tsc --noEmit
        git diff
        정적 확인
    validations:
      required: true

  - type: textarea
    id: report
    attributes:
      label: 보고 형식
      value: |
        1. 원인 분석
        2. 수정 위치
        3. 변경 전 문제
        4. 변경 후 규칙
        5. tsc 결과
        6. git diff 요약
    validations:
      required: true