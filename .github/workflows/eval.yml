name: promptfoo eval

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run promptfoo eval
        run: npx --yes promptfoo@latest eval -c promptfoo.yaml
